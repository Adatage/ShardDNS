syntax = "proto3";

package dns_manager;

option go_package = "github.com/Adatage/ShardDNS/api;dnsmgr";

import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

service DNSManager {
  rpc CreateZone(CreateZoneRequest) returns (Zone);
  rpc GetZone(GetZoneRequest)       returns (Zone);
  rpc UpdateZone(UpdateZoneRequest) returns (Zone);
  rpc DeleteZone(DeleteZoneRequest) returns (google.protobuf.Empty);
  rpc ListZones(ListZonesRequest)   returns (ListZonesResponse);

  rpc CreateRecord(CreateRecordRequest) returns (Record);
  rpc DeleteRecord(DeleteRecordRequest) returns (google.protobuf.Empty);
  rpc ListRecords(ListRecordsRequest)   returns (ListRecordsResponse);
  rpc GetRecords(GetRecordsRequest)     returns (ListRecordsResponse);

  rpc EnableDNSSEC(EnableDNSSECRequest)     returns (DNSSECStatus);
  rpc DisableDNSSEC(DisableDNSSECRequest)   returns (google.protobuf.Empty);
  rpc GetDNSSECStatus(GetDNSSECStatusRequest) returns (DNSSECStatus);
  rpc RotateKey(RotateKeyRequest)           returns (DNSSECStatus);
}

enum DNSAlgorithm {
  ALGO_UNSPECIFIED = 0;
  ALGO_ECDSAP256   = 13;
  ALGO_ECDSAP384   = 14;
  ALGO_ED25519     = 15;
}

message EnableDNSSECRequest {
  string       zone      = 1;
  DNSAlgorithm algorithm = 2;
}

message DisableDNSSECRequest   { string zone = 1; }
message GetDNSSECStatusRequest { string zone = 1; }

message RotateKeyRequest {
  string       zone      = 1;
  string       key_type  = 2;
  DNSAlgorithm algorithm = 3;
}

message DNSSECStatus {
  string zone    = 1;
  bool   enabled = 2;
  repeated DNSSECKey keys = 3;
  string ds_record = 4;
}

message DNSSECKey {
  int32        key_tag      = 1;
  string       key_type     = 2;
  DNSAlgorithm algorithm    = 3;
  bool         active       = 4;
  string       dnskey_rdata = 5;
  google.protobuf.Timestamp created_at = 6;
  google.protobuf.Timestamp expires_at = 7;
}

message Zone {
  string name        = 1;
  string primary_ns  = 2;
  string admin_email = 3;
  int64  serial      = 4;
  int32  refresh     = 5;
  int32  retry       = 6;
  int32  expire      = 7;
  int32  minimum_ttl = 8;
  google.protobuf.Timestamp created_at = 9;
  google.protobuf.Timestamp updated_at = 10;
}

message Record {
  string zone       = 1;
  string name       = 2;
  string type       = 3;
  int32  ttl        = 4;
  string rdata      = 5;
  google.protobuf.Timestamp created_at = 6;
}

message CreateZoneRequest {
  string name        = 1;
  string primary_ns  = 2;
  string admin_email = 3;
  int32  refresh     = 4;
  int32  retry       = 5;
  int32  expire      = 6;
  int32  minimum_ttl = 7;
}

message GetZoneRequest    { string name = 1; }
message DeleteZoneRequest { string name = 1; }
message UpdateZoneRequest {
  string name        = 1;
  string primary_ns  = 2;
  string admin_email = 3;
  int32  refresh     = 4;
  int32  retry       = 5;
  int32  expire      = 6;
  int32  minimum_ttl = 7;
}

message ListZonesRequest  { int32 page_size = 1; string page_token = 2; }
message ListZonesResponse { repeated Zone zones = 1; string next_page_token = 2; }

message CreateRecordRequest {
  string zone  = 1;
  string name  = 2;
  string type  = 3;
  int32  ttl   = 4;
  string rdata = 5;
}

message DeleteRecordRequest {
  string zone  = 1;
  string name  = 2;
  string type  = 3;
  string rdata = 4;
}

message ListRecordsRequest  { string zone = 1; int32 page_size = 2; }
message ListRecordsResponse { repeated Record records = 1; }

message GetRecordsRequest {
  string zone = 1;
  string name = 2;
  string type = 3;
}