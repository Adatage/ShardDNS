syntax = "proto3";

package dns_manager;

option go_package = "github.com/Adatage/ShardDNS/api;dnsmgr";

import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

service DNSManager {
  rpc CreateZone(CreateZoneRequest) returns (Zone);
  rpc GetZone(GetZoneRequest)       returns (Zone);
  rpc UpdateZone(UpdateZoneRequest) returns (Zone);
  rpc DeleteZone(DeleteZoneRequest) returns (google.protobuf.Empty);
  rpc ListZones(ListZonesRequest)   returns (ListZonesResponse);

  rpc CreateRecord(CreateRecordRequest) returns (Record);
  rpc DeleteRecord(DeleteRecordRequest) returns (google.protobuf.Empty);
  rpc ListRecords(ListRecordsRequest)   returns (ListRecordsResponse);
  rpc GetRecords(GetRecordsRequest)     returns (ListRecordsResponse);
}

message Zone {
  string name        = 1;
  string primary_ns  = 2;
  string admin_email = 3;
  int64  serial      = 4;
  int32  refresh     = 5;
  int32  retry       = 6;
  int32  expire      = 7;
  int32  minimum_ttl = 8;
  google.protobuf.Timestamp created_at = 9;
  google.protobuf.Timestamp updated_at = 10;
}

message Record {
  string zone       = 1;
  string name       = 2;
  string type       = 3;
  int32  ttl        = 4;
  string rdata      = 5;
  google.protobuf.Timestamp created_at = 6;
}

message CreateZoneRequest {
  string name        = 1;
  string primary_ns  = 2;
  string admin_email = 3;
  int32  refresh     = 4;
  int32  retry       = 5;
  int32  expire      = 6;
  int32  minimum_ttl = 7;
}

message GetZoneRequest    {
  string name = 1;
}

message DeleteZoneRequest {
  string name = 1;
}

message UpdateZoneRequest {
  string name        = 1;
  string primary_ns  = 2;
  string admin_email = 3;
  int32  refresh     = 4;
  int32  retry       = 5;
  int32  expire      = 6;
  int32  minimum_ttl = 7;
}

message ListZonesRequest  {
  int32 page_size = 1; string page_token = 2;
}

message ListZonesResponse {
  repeated Zone zones = 1; string next_page_token = 2;
}

message CreateRecordRequest {
  string zone  = 1;
  string name  = 2;
  string type  = 3;
  int32  ttl   = 4;
  string rdata = 5;
}

message DeleteRecordRequest {
  string zone  = 1;
  string name  = 2;
  string type  = 3;
  string rdata = 4;
}

message ListRecordsRequest  {
  string zone = 1; int32 page_size = 2;
}

message ListRecordsResponse {
  repeated Record records = 1;
}

message GetRecordsRequest {
  string zone = 1;
  string name = 2;
  string type = 3;
}